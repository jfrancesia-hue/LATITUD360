<!DOCTYPE html>
<html lang="es-AR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LATITUD360 — Memoria de la minería del NOA</title>
  <meta name="description" content="Una crónica editorial de la minería del Triángulo del Litio. Construida desde Catamarca para la operación, la comunidad y el archivo del NOA argentino.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'azul-profundo':       '#081826',
            'azul-institucional':  '#12385B',
            'azul-mineral':        '#5E86A8',
            'cobre':               '#B8754A',
            'oro-viejo':           '#C2A56D',
            'papel':               '#F5F1EA',
            'papel-sombra':        '#EDE6D9',
            'gris-roca':           '#8C949C',
            'tinta':               '#161616',
          },
          fontFamily: {
            display: ['"Cormorant Garamond"', 'Georgia', 'serif'],
            body:    ['Inter', 'system-ui', 'sans-serif'],
            mono:    ['"JetBrains Mono"', 'monospace'],
          },
          letterSpacing: {
            'institutional': '0.18em',
          }
        }
      }
    };
  </script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
  <script src="https://unpkg.com/framer-motion@11.11.17/dist/framer-motion.js"></script>
  <script>window.Motion = window.FramerMotion;</script>

  <style>
    html { scroll-behavior: smooth; }
    body {
      background-color: #F5F1EA;
      color: #161616;
      font-family: 'Inter', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    /* Textura sutil de papel — un grano fino casi imperceptible */
    .paper-texture {
      background-image:
        radial-gradient(rgba(22, 22, 22, 0.025) 1px, transparent 1px),
        radial-gradient(rgba(184, 117, 74, 0.02) 1px, transparent 1px);
      background-size: 4px 4px, 7px 7px;
      background-position: 0 0, 2px 2px;
    }

    /* Bloque editorial con borde-marco fino tipo placa de museo */
    .museum-block {
      border: 1px solid rgba(22, 22, 22, 0.12);
      background-color: #F5F1EA;
    }

    /* Línea decorativa con doble trazo tipo periódico */
    .editorial-rule {
      border-top: 1px solid #161616;
      box-shadow: 0 3px 0 -2px #161616;
    }

    /* Drop cap monumental */
    .drop-cap::first-letter {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 400;
      font-size: 5rem;
      line-height: 0.85;
      float: left;
      padding: 0.4rem 0.6rem 0 0;
      color: #B8754A;
    }

    /* Líneas topográficas SVG — patrón sutil */
    .topo-pattern {
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'><g fill='none' stroke='%2312385B' stroke-width='0.4' stroke-opacity='0.15'><circle cx='100' cy='100' r='30'/><circle cx='100' cy='100' r='50'/><circle cx='100' cy='100' r='70'/><circle cx='100' cy='100' r='90'/></g></svg>");
      background-repeat: repeat;
      background-size: 220px 220px;
    }

    /* Hover ceremonial — leve subrayado largo */
    .editorial-link {
      position: relative;
      display: inline-block;
      transition: color 0.4s ease;
    }
    .editorial-link::after {
      content: '';
      position: absolute;
      left: 0;
      bottom: -3px;
      width: 0;
      height: 1px;
      background-color: currentColor;
      transition: width 0.6s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .editorial-link:hover::after { width: 100%; }

    /* Caption italic estilo museo */
    .museum-caption {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      color: rgba(22, 22, 22, 0.7);
    }

    /* Marquee/ticker animation */
    @keyframes marquee {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    .ticker-track {
      animation: marquee 60s linear infinite;
    }

    /* Selección de texto */
    ::selection { background-color: #B8754A; color: #F5F1EA; }
    ::-moz-selection { background-color: #B8754A; color: #F5F1EA; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="env,react">
    const { motion, AnimatePresence } = window.Motion;
    const { useState, useEffect } = React;

    const Reveal = ({ children, delay = 0, y = 30 }) => {
      const ref = React.useRef(null);
      const [visible, setVisible] = useState(false);
      useEffect(() => {
        const obs = new IntersectionObserver(
          ([e]) => e.isIntersecting && setVisible(true),
          { threshold: 0.15 },
        );
        if (ref.current) obs.observe(ref.current);
        return () => obs.disconnect();
      }, []);
      return (
        <motion.div
          ref={ref}
          initial={{ opacity: 0, y }}
          animate={visible ? { opacity: 1, y: 0 } : {}}
          transition={{ duration: 1.2, ease: [0.22, 1, 0.36, 1], delay }}
        >
          {children}
        </motion.div>
      );
    };

    const SmallCaps = ({ children, className = "" }) => (
      <span className={`uppercase tracking-institutional text-xs font-medium ${className}`}>
        {children}
      </span>
    );

    const HorizontalRule = ({ className = "" }) => (
      <div className={`flex items-center gap-3 my-6 ${className}`}>
        <div className="flex-1 h-px bg-tinta/15" />
        <div className="w-1 h-1 rounded-full bg-cobre" />
        <div className="flex-1 h-px bg-tinta/15" />
      </div>
    );

    // 1. INTRO CEREMONIAL
    const IntroCeremonial = ({ onDone }) => {
      const [phase, setPhase] = useState(0);
      useEffect(() => {
        const t1 = setTimeout(() => setPhase(1), 800);
        const t2 = setTimeout(() => setPhase(2), 2200);
        const t3 = setTimeout(() => onDone && onDone(), 3400);
        return () => { clearTimeout(t1); clearTimeout(t2); clearTimeout(t3); };
      }, []);

      return (
        <AnimatePresence>
          {phase < 2 && (
            <motion.div
              key="intro"
              initial={{ opacity: 1 }}
              exit={{ opacity: 0, transition: { duration: 1 } }}
              className="fixed inset-0 z-50 bg-papel paper-texture flex flex-col items-center justify-center"
            >
              <motion.div
                initial={{ opacity: 0, letterSpacing: '1em' }}
                animate={{ opacity: 1, letterSpacing: '0.4em' }}
                transition={{ duration: 1.6, ease: [0.22, 1, 0.36, 1] }}
                className="font-display text-tinta uppercase font-light text-sm md:text-base"
              >
                LATITUD ⬩ TRESCIENTOS SESENTA
              </motion.div>
              <motion.div
                initial={{ opacity: 0, scaleY: 0 }}
                animate={{ opacity: phase >= 1 ? 1 : 0, scaleY: phase >= 1 ? 1 : 0 }}
                transition={{ duration: 1, delay: 0.6 }}
                className="my-8 w-px h-20 bg-cobre origin-top"
              />
              <motion.div
                initial={{ opacity: 0 }}
                animate={{ opacity: phase >= 1 ? 1 : 0 }}
                transition={{ duration: 0.8, delay: 1.4 }}
                className="font-display italic text-tinta/80 text-base md:text-lg max-w-md text-center px-6"
              >
                Memoria de la minería del NOA.
              </motion.div>
            </motion.div>
          )}
        </AnimatePresence>
      );
    };

    // 2. MASTHEAD
    const Masthead = () => {
      const today = new Date().toLocaleDateString('es-AR', {
        weekday: 'long', day: 'numeric', month: 'long', year: 'numeric',
      });
      return (
        <header className="paper-texture border-b border-tinta">
          <div className="max-w-[1280px] mx-auto px-6 md:px-10 pt-6 pb-3">
            <div className="grid grid-cols-1 md:grid-cols-3 items-end gap-4 md:gap-8 text-tinta">
              <div className="font-mono text-[11px] uppercase tracking-institutional text-tinta/70 order-2 md:order-1 text-left">
                Año I · No. 1<br/>
                Catamarca · Argentina
              </div>
              <div className="order-1 md:order-2 text-center">
                <div className="font-display italic text-5xl md:text-6xl lg:text-7xl leading-none tracking-tight">
                  Latitud<span className="text-cobre">360</span>
                </div>
                <div className="mt-2 font-mono text-[10px] uppercase tracking-institutional text-tinta/60">
                  Crónica · Operación · Territorio
                </div>
              </div>
              <div className="font-mono text-[11px] uppercase tracking-institutional text-tinta/70 order-3 text-right">
                {today}<br/>
                Salar · -2°C · Viento NO 18 km/h
              </div>
            </div>
            <div className="mt-4 editorial-rule"></div>
            <div className="mt-3 flex flex-wrap items-center justify-between gap-3 font-mono text-[10px] uppercase tracking-institutional text-tinta/65">
              <div>Lat. 25°S · Long. 67°O · Altitud 4000 m</div>
              <div className="hidden md:flex gap-5">
                <a href="#hero" className="editorial-link">Sumario</a>
                <a href="#cronica" className="editorial-link">Crónica</a>
                <a href="#atlas" className="editorial-link">Atlas</a>
                <a href="#voces" className="editorial-link">Voces</a>
                <a href="#archivo" className="editorial-link">Archivo</a>
                <a href="#newsletter" className="editorial-link text-cobre">Suscribirse</a>
              </div>
              <div className="text-right">Litio · Oro · Cobre · Salares</div>
            </div>
          </div>
        </header>
      );
    };

    // 3. HERO MONUMENTAL 50/50
    const HeroMonumental = () => (
      <section id="hero" className="relative paper-texture">
        <div className="max-w-[1280px] mx-auto px-6 md:px-10 py-16 md:py-28">
          <div className="grid grid-cols-1 lg:grid-cols-2 gap-12 lg:gap-20 items-center">
            <div>
              <Reveal>
                <SmallCaps className="text-cobre">N° 1 · Edición fundacional · Abril 2026</SmallCaps>
              </Reveal>
              <Reveal delay={0.2}>
                <h1 className="mt-6 font-display italic font-light text-tinta leading-[0.92] tracking-tight text-5xl md:text-6xl lg:text-7xl">
                  El sistema operativo<br/>
                  de la minería<br/>
                  <span className="text-cobre">del NOA argentino.</span>
                </h1>
              </Reveal>
              <Reveal delay={0.5}>
                <div className="editorial-rule my-10 max-w-xs"></div>
              </Reveal>
              <Reveal delay={0.7}>
                <p className="font-body text-tinta/80 text-base md:text-lg leading-relaxed max-w-xl">
                  Latitud360 es una plataforma operativa, una memoria editorial y un atlas vivo. Nace en Catamarca para acompañar a las mineras del Triángulo del Litio en su operación cotidiana, su comunicación con la comunidad y la trazabilidad pública de su impacto.
                </p>
              </Reveal>
              <Reveal delay={0.9}>
                <div className="mt-10 flex flex-wrap items-center gap-6">
                  <a href="#newsletter" className="inline-flex items-center gap-3 px-7 py-3 bg-azul-institucional text-papel font-medium tracking-wide hover:bg-azul-profundo transition-colors duration-500">
                    Solicitar dossier
                    <span className="opacity-60">→</span>
                  </a>
                  <a href="#cronica" className="editorial-link font-display italic text-tinta text-lg">
                    Leer la crónica fundacional
                  </a>
                </div>
              </Reveal>
            </div>

            <Reveal delay={0.4} y={50}>
              <figure className="relative">
                <div className="aspect-[4/5] bg-azul-profundo overflow-hidden relative">
                  <div className="absolute inset-0 topo-pattern opacity-60"></div>
                  <div className="absolute inset-0 bg-gradient-to-b from-azul-profundo/30 via-azul-institucional/40 to-azul-profundo/80"></div>
                  <svg className="absolute inset-0 w-full h-full" viewBox="0 0 400 500" preserveAspectRatio="xMidYMid slice">
                    <defs>
                      <linearGradient id="moon" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" stopColor="#C2A56D" stopOpacity="0.9"/>
                        <stop offset="100%" stopColor="#B8754A" stopOpacity="0.4"/>
                      </linearGradient>
                    </defs>
                    <path d="M 0 380 L 60 320 L 110 350 L 180 280 L 230 310 L 290 250 L 340 290 L 400 240 L 400 500 L 0 500 Z" fill="#081826" opacity="0.7"/>
                    <path d="M 0 420 L 80 380 L 140 400 L 220 350 L 280 380 L 340 340 L 400 360 L 400 500 L 0 500 Z" fill="#161616" opacity="0.85"/>
                    <circle cx="290" cy="200" r="55" fill="url(#moon)" opacity="0.85"/>
                    <line x1="290" y1="380" x2="290" y2="450" stroke="#C2A56D" strokeWidth="1" opacity="0.4"/>
                    <line x1="270" y1="395" x2="310" y2="395" stroke="#C2A56D" strokeWidth="0.6" opacity="0.3"/>
                    <line x1="278" y1="410" x2="302" y2="410" stroke="#C2A56D" strokeWidth="0.6" opacity="0.25"/>
                  </svg>
                </div>
                <figcaption className="mt-4 museum-caption text-sm">
                  «Salar del Hombre Muerto al amanecer» — fotograbado documental, Catamarca, abril 2026.
                </figcaption>
              </figure>
            </Reveal>
          </div>
        </div>
      </section>
    );

    // 4. TICKER EDITORIAL
    const TickerEditorial = () => {
      const items = [
        "Récord histórico: 127 días sin accidentes con tiempo perdido en Mina Hombre Muerto",
        "18 mineras del NOA en pipeline para integración 2026",
        "Cumbre de Litio Catamarca convoca a 12 países productores",
        "MARA + Agua Rica anuncia inversión USD 4.500 millones para 27 años de operación",
        "Programa Pioneros NOA cierra con 6 contratos firmados antes de Q3",
        "Nuevo observatorio ambiental lanza monitoreo en tiempo real del salar",
      ];
      const repeated = [...items, ...items];
      return (
        <section className="bg-cobre text-papel border-y border-tinta/30 overflow-hidden">
          <div className="flex items-center">
            <div className="px-6 py-3 bg-tinta text-papel font-mono text-[11px] uppercase tracking-institutional whitespace-nowrap">
              ⬩ Boletín en vivo
            </div>
            <div className="flex-1 overflow-hidden relative">
              <div className="ticker-track flex items-center whitespace-nowrap">
                {repeated.map((item, i) => (
                  <span key={i} className="font-display italic text-base md:text-lg px-8 flex items-center gap-3">
                    {item}
                    <span className="text-papel/50">◆</span>
                  </span>
                ))}
              </div>
            </div>
          </div>
        </section>
      );
    };

    // 5. PRIMERA PLANA
    const PrimeraPlana = () => (
      <section className="paper-texture border-b border-tinta/10">
        <div className="max-w-[1280px] mx-auto px-6 md:px-10 py-20 md:py-28">
          <Reveal>
            <div className="flex items-center justify-between mb-10">
              <SmallCaps className="text-cobre">Primera plana · Edición fundacional</SmallCaps>
              <span className="font-mono text-[10px] uppercase tracking-institutional text-tinta/50">Pág. 03</span>
            </div>
          </Reveal>

          <div className="grid grid-cols-1 lg:grid-cols-12 gap-8 lg:gap-14">
            <Reveal delay={0.2}>
              <figure className="lg:col-span-7">
                <div className="aspect-[16/10] relative overflow-hidden bg-azul-institucional">
                  <div className="absolute inset-0 topo-pattern opacity-30"></div>
                  <svg className="absolute inset-0 w-full h-full" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid slice">
                    <defs>
                      <pattern id="brine" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
                        <rect width="60" height="60" fill="#5E86A8" opacity="0.6"/>
                        <rect x="2" y="2" width="56" height="56" fill="#12385B" opacity="0.4"/>
                      </pattern>
                    </defs>
                    <rect width="800" height="500" fill="url(#brine)"/>
                    <g stroke="#F5F1EA" strokeOpacity="0.15" strokeWidth="1" fill="none">
                      <rect x="60"  y="60"  width="180" height="120"/>
                      <rect x="260" y="60"  width="220" height="180"/>
                      <rect x="500" y="80"  width="240" height="160"/>
                      <rect x="80"  y="200" width="160" height="140"/>
                      <rect x="260" y="260" width="200" height="160"/>
                      <rect x="480" y="260" width="260" height="180"/>
                    </g>
                    <rect x="380" y="220" width="14" height="6" fill="#B8754A"/>
                  </svg>
                </div>
                <figcaption className="mt-3 museum-caption text-sm">
                  «Geometría del litio» — vista aérea de los piletones de evaporación, Salar del Hombre Muerto.
                </figcaption>
              </figure>
            </Reveal>

            <Reveal delay={0.4}>
              <div className="lg:col-span-5">
                <SmallCaps className="text-azul-institucional">Crónica fundacional</SmallCaps>
                <h2 className="mt-4 font-display italic font-light text-tinta leading-[1.05] text-4xl md:text-5xl tracking-tight">
                  La minería argentina <br/>
                  ya no operará a oscuras.
                </h2>
                <HorizontalRule className="max-w-[180px]" />
                <p className="font-display italic text-tinta/80 text-lg leading-relaxed">
                  Nativos Consultora Digital presenta una infraestructura editorial y operativa para una industria que produce el 60% del litio argentino y, hasta ahora, lo hacía con planillas dispersas y registros analógicos.
                </p>
                <p className="mt-6 font-body text-tinta/75 leading-relaxed">
                  Tres productos —Minera360, Latitud y Contacto— se integran en una única plataforma con seguridad, ambiente, mantenimiento, capacitación, comunicación interna y un medio editorial propio. La promesa: trazabilidad continua, predicción real y memoria pública.
                </p>
                <p className="mt-6 font-body text-tinta/75 text-sm">
                  Por <span className="italic">Jorge Eduardo Francesia</span> — Founder, Nativos
                </p>
              </div>
            </Reveal>
          </div>
        </div>
      </section>
    );

    // 6. GRAN CRÓNICA
    const GranCronica = () => (
      <section id="cronica" className="bg-papel-sombra border-y border-tinta/10">
        <div className="max-w-[1280px] mx-auto px-6 md:px-10 py-20 md:py-28">
          <div className="text-center mb-12">
            <Reveal>
              <SmallCaps className="text-cobre">Gran crónica · Reportaje</SmallCaps>
            </Reveal>
            <Reveal delay={0.2}>
              <h2 className="mt-6 font-display italic font-light text-tinta leading-[0.95] text-5xl md:text-7xl tracking-tight max-w-4xl mx-auto">
                El triángulo del litio,<br/>
                visto desde adentro.
              </h2>
            </Reveal>
          </div>

          <Reveal delay={0.4}>
            <article className="font-body text-tinta/85 leading-relaxed text-base md:text-[17px] columns-1 md:columns-2 lg:columns-3 gap-10 max-w-[1100px] mx-auto">
              <p className="drop-cap mb-5">
                A 4.000 metros de altura, sobre la línea fronteriza entre Catamarca, Salta y Jujuy, se extiende una geografía que el mundo recién empieza a entender. El Triángulo del Litio —una franja altiplánica compartida con Bolivia y Chile— concentra el 56% de las reservas globales de un mineral que electrificará la próxima década.
              </p>
              <p className="mb-5">
                Argentina ya produce más del 30% del litio sudamericano. Pero la industria opera, en su mayoría, con software de fines del siglo veinte y con relatos públicos casi inexistentes. Las decisiones se toman en planillas. Los reportes se firman a mano. La comunidad pregunta y casi nadie le responde.
              </p>
              <p className="mb-5">
                Latitud360 nace de esa observación. La fundamenta una premisa simple y antigua: <span className="font-display italic">una operación bien contada es una operación bien hecha</span>. Si se quiere transparencia, hay que diseñar la infraestructura que la sostenga. Si se quiere seguridad, los datos tienen que circular en el momento exacto en que ocurren los hechos.
              </p>
              <p className="mb-5">
                La plataforma se construye desde Catamarca, en una alianza con mineras del NOA que ya están operando proyectos de litio, oro y cobre. Tres productos forman su columna: <span className="font-display italic">Minera360</span> ordena la operación, <span className="font-display italic">Contacto</span> articula la voz interna del minero, y <span className="font-display italic">Latitud</span> —el medio editorial que estás leyendo— vuelve público lo que merece serlo.
              </p>
              <p className="mb-5">
                Sobre los tres productos descansa un sistema de inteligencia entrenado para el contexto andino. No es un asistente genérico: es un agente que cruza datos cruzados de seguridad, mantenimiento, ambiente y clima organizacional, y entrega lecturas que solo serían posibles si todo conviviera en el mismo lugar. Un freno que falla, un operario sin recertificar, una encuesta de pulso baja, un viento que sube. La conjunción produce una alerta. La alerta evita una tragedia.
              </p>
              <p>
                Esta primera edición editorial coincide con el lanzamiento del producto. Es un acto deliberado: <span className="font-display italic">la marca se presenta hablando</span>, no vendiendo. El compromiso es sostenerlo. Cada semana, una crónica. Cada mes, un atlas. Cada trimestre, una entrevista en profundidad. La minería del NOA tendrá su archivo. Y el archivo, cuando se construye con rigor, se vuelve memoria viva.
              </p>
            </article>
          </Reveal>

          <Reveal delay={0.6}>
            <div className="mt-12 text-center">
              <div className="editorial-rule max-w-xs mx-auto"></div>
              <p className="mt-6 font-display italic text-tinta/60">
                Continúa en página interior · 12 minutos de lectura
              </p>
            </div>
          </Reveal>
        </div>
      </section>
    );

    // 7. ATLAS / MAPA INTERACTIVO
    const AtlasMapa = () => {
      const points = [
        { id: 'cat', label: 'Catamarca · Salar Hombre Muerto',  cx: 200, cy: 280, mineral: 'Litio',  inversion: 'USD 1.200 M', estado: 'Operación activa' },
        { id: 'juj', label: 'Jujuy · Olaroz Cauchari',           cx: 160, cy: 180, mineral: 'Litio',  inversion: 'USD 980 M',   estado: 'Expansión' },
